<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Secretária Pessoal</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      padding-bottom: 90px;
    }

    header {
      padding: 22px 18px 14px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: white;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    header p {
      margin: 6px 0 0;
      opacity: 0.95;
      font-size: 0.95rem;
    }

    main {
      padding: 16px;
      max-width: 980px;
      margin: 0 auto;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .muted { color: var(--muted); }
    .big { font-size: 1.5rem; font-weight: 700; }
    .small { font-size: 0.88rem; }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--primary-soft);
      color: var(--primary);
      margin: 2px 6px 2px 0;
    }

    input, select, textarea, button { font: inherit; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-light { background: #eff6ff; color: var(--primary); }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      padding: 8px;
    }

    .nav button.active {
      color: var(--primary);
      background: #eff6ff;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Secretária Pessoal</h1>
    <p>Organize sua vida financeira e rotina</p>
  </header>

  <main>
    <section id="home" class="screen active">
      <div class="card">
        <h2>Bem-vindo</h2>
        <p>Seu app está funcionando 🎉</p>
      </div>
    </section>

    <section id="financas" class="screen">
      <div class="card">
        <h2>Finanças</h2>
        <p>Área de controle financeiro</p>
      </div>
    </section>

    <section id="agenda" class="screen">
      <div class="card">
        <h2>Agenda</h2>
      </div>
    </section>

    <section id="tarefas" class="screen">
      <div class="card">
        <h2>Tarefas</h2>
      </div>
    </section>

    <section id="estudos" class="screen">
      <div class="card">
        <h2>Estudos</h2>
      </div>
    </section>

    <section id="lazer" class="screen">
      <div class="card">
        <h2>Lazer</h2>
      </div>
    </section>
  </main>

  <nav class="nav">
    <button onclick="show('home')">Início</button>
    <button onclick="show('financas')">Finanças</button>
    <button onclick="show('agenda')">Agenda</button>
    <button onclick="show('tarefas')">Tarefas</button>
    <button onclick="show('estudos')">Estudos</button>
    <button onclick="show('lazer')">Lazer</button>
  </nav>

  <script>
    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
